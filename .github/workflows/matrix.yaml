name: Matrix
on: workflow_dispatch
jobs:
    matrix-worlflow:
        name: Node ${{ matrix.node }} on ${{ matrix.os }}
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                node: [18.x, 20.x, 21.x]
                os:
                    - ubuntu-latest
                    - windows-latest
            steps:
                - name: checkout code
                  uses: actions/checkout@v4    
                - name: Setup node
                  uses: actions/setup-node@v4
                  with:
                      node-version: ${{ matrix.node }}
                - name: Runing sime tests
                  run: echo "Running tests on Node ${{ matrix.node }} on ${{ matrix.os }}"
                