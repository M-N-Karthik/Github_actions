name: Matrix
on: workflow_dispatch
jobs:
    matrix-worlflow:
        name: Node ${{ matrix.node }} on ${{ matrix.os }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                node: [18.x, 20.x, 21.x]
                os:
                    - ubuntu-latest
                    - windows-latest
                include:
                    - node: 22.x
                      os: ubuntu-latest
                    - name: 21.x
                      os: ubuntu-latest
                      tage: "experimental"
        steps:
            - name: checkout code
              uses: actions/checkout@v4    
            - name: Setup node
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node }}
            - name: Experimental step
              if: matrix.tage == 'experimental'
              run: exit 1
            - name: Runing sime tests
              run: |
                echo "Running tests on Node ${{ matrix.node }} on ${{ matrix.os }}"
                sleep 20
            - name: Testing the matrix
              run: echo "Testing the matrix workflow"
                