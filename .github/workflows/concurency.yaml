name: Managing cuncurrency
on: 
    workflow_dispatch:
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
        - name: checkout code
          uses: actions/checkout@v3
        - name: Ping URL
          uses: ./.github/actions/docker-ping-url
          with:
            url: https://www.google.com
            max-retries: 10
            delay: 5