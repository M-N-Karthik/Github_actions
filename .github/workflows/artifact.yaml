name: artifact
on:
    workflow_dispatch:
        inputs:
            node-version:
              type: choice
              options:
                    - 18.x
                    - 20.x
              default: 20.x
              description: "Node.js version to use"
            cache:
              type: boolean
              default: true
              description: "Whether to use cache or not"

jobs:
    test-build:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: artifact/react-app
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                node-version: ${{ inputs.node-version }}
            - name: cache key
              if: ${{ inputs.cache }}
              uses: actions/cache@v3
              id: cache-node-modules
              with:
                path: artifact/react-app/node_modules
                key: cache-keys-${{ hashFiles('artifact/react-app/package-lock.json') }}
            - name: Install dependencies
              if : ${{ steps.cache-node-modules.outputs.cache-hit != 'true' }}
              run: npm ci
            - name: Run tests
              run: npm test
            - name: Build the React app
              run: npm run build
            - name: Upload artifact
              uses: actions/upload-artifact@v3
              with:
                name: app
                path: artifact/react-app/build  
    deploy:
        runs-on: ubuntu-latest
        needs: test-build
        steps:
            - name: Download artifact
              uses: actions/download-artifact@v3
              with:
                name: app
                path: build
            - name: show folder structure
              run: ls -R 