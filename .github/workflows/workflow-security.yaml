name: workflow-security
on:
    pull_request:
        branches: [ main ]
jobs:
    unsafe-pr:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v3
            - name: checkout PR title
              run: |
                title=${{ github.event.pull_request.title }}
                if [[ $title =~ ^feat ]]; then
                echo "PR is a feature"
                exit 0
                else
                echo "PR is not a feature"
                exit 1
                fi
    safe-pr:
        runs-on: ubuntu-latest
        env:
            TITLE: ${{ github.event.pull_request.title }}
        steps:
            - name: checkout code
              uses: actions/checkout@v3
            - name: checkout PR title
              run: |
                if [[ $TITLE =~ ^feat ]]; then
                echo "PR is a feature"
                exit 0
                else
                echo "PR is not a feature"
                exit 1
                fi