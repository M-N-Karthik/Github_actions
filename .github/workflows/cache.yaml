name: cache
on:
   workflow_dispatch:
       inputs:
         use-cache:
           type: boolean
           default: true
           description: "Whether to use cache or not"
jobs: 
    build:
        runs-on: ubuntu-latest
        defaults:
          run:
            working-directory: react-app
        steps:
            - name: checkout code
              uses: actions/checkout@v3
            - name: Setup node
              uses: actions/setup-node@v3
              with:
                node-version: '20.x'
            - name: install dependencies
              run: npm install
            - name: test
              run: npm test
            - name: Build
              run: npm run build
            - name: Deploying to non prod
              run: echo "Deploying to non prod environment"