name: using the reusable workflow
on:
  workflow_dispatch:
jobs:
  call-reusable-workflow:
    uses: ./.github/workflows/reusable-workflow.yaml
    with:
      target-directory: dummy-directory
  printing-build-status:
    runs-on: ubuntu-latest
    needs: call-reusable-workflow
    steps:
      - name: Print build status
        run: |
          echo "Build status: ${{ needs.call-reusable-workflow.outputs.build_status }}"
      - name: Print URL
        run: |
          echo "Deployed URL: ${{ needs.call-reusable-workflow.outputs.url }}"