name: env
on: workflow_dispatch
jobs:
    deploy-staging:
        runs-on: ubuntu-latest
        environment: staging
        steps:
            - name: Deploy to Staging
              run: echo "Deploying to staging environment."
    e2e-testing:
        runs-on: ubuntu-latest
        needs: deploy-staging
        environment: testing
        steps:
            - name: Run E2E tests
              run: echo "Running end-to-end tests in testing environment."
    deploy-production-froontend:
        runs-on: ubuntu-latest
        needs: e2e-testing
        environment: prod
        steps:
            - name: Deploy to Production
              run: echo "Deploying to production frontend environment."
    deploy-production-backend1:
        runs-on: ubuntu-latest
        needs: e2e-testing
        environment: prod
        steps:
            - name: Deploy to Production
              run: echo "Deploying to production backend1 environment."
    deploy-production-backend2:
        runs-on: ubuntu-latest
        needs: e2e-testing
        environment: prod
        steps:
            - name: Deploy to Production
              run: echo "Deploying to production backend2 environment."