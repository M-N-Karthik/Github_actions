name: cache
on:
   workflow_dispatch:
       inputs:
          use-cache:
           type: boolean
           default: true
           description: "Whether to use cache or not"
          node-version:
            type: choice
            options:
              - 18.x
              - 20.x
            default: 20.x
            description: "Node.js version to use"
jobs: 
    install-deps:
        runs-on: ubuntu-latest 
        outputs:
            cachekey: ${{ steps.cache-key.outputs.cachekey }}
        defaults:
          run:
            working-directory: react-app
        steps:
            - name: checkout code
              uses: actions/checkout@v3
            - name: Setup node
              uses: actions/setup-node@v3
              with:
                node-version: ${{ inputs.node-version }}
            - name: cahe key
              id: cache-key
              run: echo "cachekey=cache-node-modules-${{hashFiles('react-app/package-lock.json')}}" >> "$GITHUB_OUTPUT"
            - name: Cache node modules
              if: ${{ inputs.use-cache }}
              uses: actions/cache@v3
              id: cache-node-modules
              with:
                path: react-app/node_modules
                key: ${{ steps.cache-key.outputs.cachekey }}
            - name: install liniting
              if: steps.cache-node-modules.outputs.cache-hit != 'true'
              run: echo "Installing dependencies"
            - name: deploying linting to non prod
              run: echo "Deploying to non prod environment"
    build:
        runs-on: ubuntu-latest
        needs: install-deps
        defaults:
          run:
            working-directory: react-app
        steps:
            - name: checkout code
              uses: actions/checkout@v3
            - name: Setup node
              uses: actions/setup-node@v3
              with:
                node-version: ${{ inputs.node-version }}
            - name: Cache node modules
              if: ${{ inputs.use-cache }}
              uses: actions/cache@v3
              id: cache-node-modules
              with:
                path: react-app/node_modules
                key: ${{ needs.install-deps.outputs.cachekey }}
            - name: install dependencies
              if: steps.cache-node-modules.outputs.cache-hit != 'true'
              run: npm install
            - name: test
              run: npm test
            - name: Build
              run: npm run build
            - name: Deploying to non prod
              run: echo "Deploying to non prod environment"