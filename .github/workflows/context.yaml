name: context
on:
   #- push
   - workflow_dispatch
env:
    MY_ENV: "worlflow"
    MY_OVERWRITTEN_ENV: "Workflow"
jobs:
    echo-data:
        runs-on: ubuntu-latest
        env:
            MY_ENV: "workflow"
            MY_OVERWRITTEN_ENV: "job"
        steps:
            - name: Echo context data
              run: |
                echo "Repository: ${{ github.repository }}"
                echo "Actor: ${{ github.actor }}"
                echo "Event Name: ${{ github.event_name }}"
                echo "Workflow: ${{ github.workflow }}"
                echo "Ref: ${{ github.ref }}"
                echo "SHA: ${{ github.sha }}"
                echo "Run ID: ${{ github.run_id }}"
                echo "Run Number: ${{ github.run_number }}"
            - name: Echo environment variables
              run: |
                echo "variable-file: ${{vars.MY_VAR}}"
            - name: MY_VARS
              run: |
                echo "MY_ENV: ${{env.MY_ENV}}"
                echo "MY_OVERWRITTEN_ENV: ${{env.MY_OVERWRITTEN_ENV}}"
    echo_data2:
        runs-on: ubuntu-latest
        steps:
            - name: retrieving_variables
              run: |
                echo "MY_ENV: ${{env.MY_ENV}}"
                echo "MY_OVERWRITTEN_ENV: ${{env.MY_OVERWRITTEN_ENV}}"


