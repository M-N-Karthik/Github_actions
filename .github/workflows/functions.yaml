name: functions
on:
    #- push
    - workflow_dispatch
jobs:
    functions:
        runs-on: ubuntu-latest
        steps:
            - name: pr title
              run: echo "PR title ${{ github.event.pull_request.title }}"
            - name: pr lables
              run: |
                cat << EOF
                ${{ toJson(github.event.pull_request.labels) }}
                EOF
            - name: bug step
              if: ${{ contains(github.event.pull_request.labels.*.name, 'bug fix') }}
              run: echo "i am bug fix"
            - name: sleep for 20
              run: sleep 20
            - name: failing step
              run: exit 1
            - name: I will be skipped
              if: ${{ failure() }}
              run: |
                echo "I will print if previous steps succeed"
            - name: I will execute
              if: ${{ success() }}
              run: |
                echo "I will print if previous steps fails"
            - name: I will execute
              if: ${{ !cancelled() }}
              run: |
                echo "I will print if the workflow is not cancelled"
            - name: I will execute when cancelled
              if: ${{ cancelled() }}
              run: |
                echo "I will print if the workflow is cancelled"