name: actions
on: push

jobs:
    build:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: Third_party_action/react_app
        steps:
            - name: Checkout code
              uses: actions/checkout@v3
            - name: Set up Node.js
              uses: actions/setup-node@v3
              with:
                node-version: '20.x'
            - name: Install dependencies
              run: npm install
            - name: Build the React app
              run: npm run build