name: actions
on: workflow_dispatch

jobs:
    build:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: Third_party_action
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '20.x'
            - name: Debug files
              run: ls -R
            - name: Install dependencies
              run: npm install
            - name: Build the React app
              run: npm run build